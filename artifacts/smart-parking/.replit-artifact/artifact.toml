kind = "web"
previewPath = "/"
title = "Smart Parking Finder"
version = "1.0.0"
id = "artifacts/smart-parking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21091

[services.development]
run = "pnpm --filter @workspace/smart-parking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-parking", "run", "build" ]
publicDir = "artifacts/smart-parking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21091"
BASE_PATH = "/"
